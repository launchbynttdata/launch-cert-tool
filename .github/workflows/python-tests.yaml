name: Run Tests

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  id-token: write

jobs:
  check:
    name: "Run Tests"
    permissions:
      contents: read
      checks: write
      pull-requests: write
    uses: launchbynttdata/launch-workflows/.github/workflows/reusable-python-uv-pytest.yml@0.15.2
    with:
      report-coverage: true
      python-version: 3.13
